<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walaa Green Netflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-green: #00ff00;
            --main-bg: #050505;
            --card-shadow: rgba(0, 255, 0, 0.3);
        }
        body {
            margin: 0; background-color: var(--main-bg); color: white;
            font-family: 'Cairo', sans-serif; overflow-x: hidden;
        }

        /* الهيدر الشفاف مثل نيتفلكس */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 4%; display: flex; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            box-sizing: border-box; transition: 0.5s;
        }
        .logo { 
            color: var(--netflix-green); font-size: 26px; font-weight: 900; 
            text-decoration: none; text-shadow: 0 0 15px var(--netflix-green);
        }

        /* البانر الكبير (الفيلم الرئيسي) */
        .banner {
            height: 75vh; background-size: cover; background-position: center top;
            display: flex; align-items: center; padding-right: 5%;
            background-image: linear-gradient(to top, var(--main-bg), transparent 30%), 
                              linear-gradient(to right, rgba(0,0,0,0.7), transparent);
        }
        .banner-content { max-width: 500px; }
        .banner-title { font-size: 45px; margin: 0; color: #fff; text-shadow: 2px 2px 10px #000; }
        .banner-btns { margin-top: 20px; }
        .btn {
            padding: 10px 25px; border: none; border-radius: 4px; 
            font-weight: bold; cursor: pointer; margin-left: 10px; font-size: 15px;
        }
        .btn-play { background-color: var(--netflix-green); color: black; box-shadow: 0 0 10px var(--netflix-green); }
        .btn-list { background-color: rgba(100, 100, 100, 0.5); color: white; }

        /* صفوف الأفلام (نفس ترتيب نيتفلكس) */
        .row { margin: 30px 0 30px 4%; }
        .row-title { font-size: 20px; margin-bottom: 10px; font-weight: bold; color: #e5e5e5; }
        
        .posters-container {
            display: flex; overflow-y: hidden; overflow-x: scroll;
            padding: 15px 0; scrollbar-width: none;
        }
        .posters-container::-webkit-scrollbar { display: none; }

        .poster {
            max-height: 230px; object-fit: cover; margin-left: 12px;
            transition: transform 450ms; cursor: pointer; border-radius: 5px;
            border: 1px solid rgba(0, 255, 0, 0.1);
        }
        .poster:hover {
            transform: scale(1.15); z-index: 10;
            border-color: var(--netflix-green);
            box-shadow: 0 0 20px var(--card-shadow);
        }

        /* زر شركة ولاء العائم */
        .walaa-float {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(0, 255, 0, 0.1); color: var(--netflix-green);
            border: 1px solid var(--netflix-green); padding: 10px 20px;
            border-radius: 4px; text-decoration: none; font-weight: bold;
            font-size: 13px; z-index: 2000; backdrop-filter: blur(5px);
        }
        .walaa-float:hover { background: var(--netflix-green); color: #000; }
    </style>
</head>
<body>

<header id="nav">
    <a href="#" class="logo">ولاء NETFLIX 🟢</a>
</header>

<section class="banner" id="mainBanner">
    <div class="banner-content">
        <h1 class="banner-title" id="bannerTitle">جاري تحميل الشفرة...</h1>
        <div class="banner-btns">
            <button class="btn btn-play">تشغيل ▶</button>
            <button class="btn btn-list">قائمةي ➕</button>
        </div>
    </div>
</section>

<div class="row">
    <h2 class="row-title">الأصلي في نيتفلكس (أخضر)</h2>
    <div class="posters-container" id="rowOriginals"></div>
</div>

<div class="row">
    <h2 class="row-title">الأفلام الرائجة الآن</h2>
    <div class="posters-container" id="rowTrending"></div>
</div>

<div class="row">
    <h2 class="row-title">أعلى التقييمات عالمياً</h2>
    <div class="posters-container" id="rowTopRated"></div>
</div>

<a href="https://t.me/FFFdif" class="walaa-float">شركة ولاء ⚔️ 2026</a>

<script>
    const API_KEY = "851ccad574593617d921dde51303751c";
    const IMG_PATH = "https://image.tmdb.org/t/p/original/";

    async function setupApp() {
        // 1. جلب بيانات البانر والصف الأول
        const res = await fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_networks=213&language=ar`);
        const data = await res.json();
        
        // تعيين الفيلم الرئيسي في البانر
        const hero = data.results[Math.floor(Math.random() * 5)];
        document.getElementById('mainBanner').style.backgroundImage = 
            `linear-gradient(to top, #050505, transparent 30%), linear-gradient(to right, rgba(0,0,0,0.7), transparent), url('${IMG_PATH + hero.backdrop_path}')`;
        document.getElementById('bannerTitle').innerText = hero.name || hero.title;

        // ملء الصف الأول
        fillRow('rowOriginals', data.results);

        // 2. جلب الرائج
        const resTrend = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=ar`);
        const dataTrend = await resTrend.json();
        fillRow('rowTrending', dataTrend.results);

        // 3. جلب الأعلى تقييماً
        const resTop = await fetch(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}&language=ar`);
        const dataTop = await resTop.json();
        fillRow('rowTopRated', dataTop.results);
    }

    function fillRow(elementId, movies) {
        const row = document.getElementById(elementId);
        movies.forEach(movie => {
            if (movie.poster_path) {
                const img = document.createElement('img');
                img.src = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
                img.className = "poster";
                img.onclick = () => alert("تقييم الفيلم: " + movie.vote_average + " ⭐");
                row.appendChild(img);
            }
        });
    }

    // تأثير اختفاء الهيدر عند السكرول
    window.addEventListener("scroll", () => {
        const nav = document.getElementById("nav");
        if (window.scrollY > 100) nav.style.backgroundColor = "#050505";
        else nav.style.backgroundColor = "transparent";
    });

    setupApp();
</script>

</body>
</html>
