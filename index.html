<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walaa Cinema Pro | Neon Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #0f0; /* الأخضر النيون الأساسي */
            --bg: #050505; 
            --card-bg: #111; 
            --glow-color: rgba(0, 255, 0, 0.3); /* لون التوهج الخفيف */
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo'; padding-bottom: 70px; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 10px 5%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); box-sizing: border-box; box-shadow: 0 0 15px var(--glow-color); }
        .logo { color: var(--neon); font-size: 18px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }

        .genres-bar { display: flex; overflow-x: auto; gap: 10px; padding: 75px 15px 15px; scrollbar-width: none; background: var(--bg); }
        .genres-bar::-webkit-scrollbar { display: none; }
        .genre-item { padding: 8px 18px; background: var(--card-bg); border-radius: 20px; white-space: nowrap; border: 1px solid #333; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .genre-item.active { background: var(--neon); color: black; border-color: var(--neon); font-weight: bold; box-shadow: 0 0 10px var(--neon); }

        /* شبكة الأفلام المحدثة بالتوهج */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        
        /* تصميم الكارت الجديد مع الإطار والتوهج */
        .m-card { 
            width: 100%; 
            height: 170px; 
            border-radius: 10px; 
            object-fit: cover; 
            background: #111; 
            transition: 0.3s ease-in-out;
            
            /* الإطار المضيء وتحديد المسافة بين الأفلام */
            border: 2px solid var(--neon); 
            
            /* التوهج الخلفي (Glow) الذي يقسم بين الأفلام */
            box-shadow: 0 0 10px var(--glow-color); 
            
            /* لضمان عدم خروج التوهج عن الحدود بشكل مزعج */
            box-sizing: border-box; 
        }

        /* التأثير عند النقر أو التحويم (Hover) */
        .m-card:active, .m-card:hover { 
            transform: scale(1.05) translateY(-5px); /* تكبير بسيط وارتفاع */
            border-color: #fff; /* تغيير لون الإطار للأبيض عند التفاعل */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); /* توهج أبيض قوي */
            z-index: 10; /* لضمان ظهور التوهج فوق الأفلام المجاورة */
        }

        /* المشغل والصفحات الأخرى (بقيت كما هي لتحقيق الاستقرار) */
        #playerZone { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #playerZone iframe { width: 100%; height: 82%; border: none; }
        .p-tools { background: #111; padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid var(--neon); }
        .p-btn { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .page { display: none; padding: 70px 15px; }
        .page.active { display: block; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--neon); z-index: 1000; box-shadow: 0 0 15px var(--glow-color); }
        .n-item { color: #555; font-size: 11px; text-align: center; cursor: pointer; text-decoration: none; }
        .n-item.active { color: var(--neon); text-shadow: 0 0 5px var(--neon); }
        
        .settings-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body>

<header><div class="logo">Walaa Cinema Pro 🛡️✨</div></header>

<div id="homePage" class="page active" style="padding: 0;">
    <div class="genres-bar">
        <div class="genre-item active" onclick="changeGenre(0, this)">الكل ⚡</div>
        <div class="genre-item" onclick="changeGenre(27, this)">رعب 👻</div>
        <div class="genre-item" onclick="changeGenre(28, this)">أكشن 💣</div>
        <div class="genre-item" onclick="changeGenre(16, this)">أنمي 🏮</div>
        <div class="genre-item" onclick="changeGenre(35, this)">كوميديا 😂</div>
    </div>
    <div class="grid" id="movieGrid"></div>
</div>

<div id="settingsPage" class="page">
    <h2 style="color:var(--neon); text-align:center;">الإعدادات ⚙️</h2>
    <a href="https://t.me/FFFdif" class="settings-card" style="background:var(--neon); color:black; font-weight:bold; justify-content:center; text-decoration:none;">المطور (قناة التليجرام) 🛡️🇮🇶</a>
</div>

<div id="playerZone">
    <iframe id="videoFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" allowfullscreen></iframe>
    <div class="p-tools">
        <button class="p-btn" style="background:#f00; color:white;" onclick="closePlayer()">إغلاق X</button>
    </div>
</div>

<div class="nav">
    <div class="n-item active" onclick="showPage('home', this)">🏠<br>الرئيسية</div>
    <div class="n-item" onclick="showPage('settings', this)">⚙️<br>الإعدادات</div>
</div>

<script>
    const API_KEY = "851ccad574593617d921dde51303751c";
    let currentPage = 1;
    let currentGenre = 0;
    let loading = false;
    let activeMovieId = "";
    let activeType = "movie";

    async function loadData(reset = false) {
        if (loading) return;
        loading = true;
        if (reset) { currentPage = 1; document.getElementById('movieGrid').innerHTML = ""; }

        const url = currentGenre === 0 
            ? `https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}&language=ar&page=${currentPage}`
            : `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${currentGenre}&language=ar&page=${currentPage}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            data.results.forEach(m => {
                if (m.poster_path) {
                    const img = document.createElement('img');
                    img.src = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
                    img.className = "m-card";
                    img.loading = "lazy";
                    img.onclick = () => playMovie(m.id, m.media_type || 'movie');
                    document.getElementById('movieGrid').appendChild(img);
                }
            });
            currentPage++;
        } catch (e) { console.log("Error loading"); }
        loading = false;
    }

    function changeGenre(id, el) {
        document.querySelectorAll('.genre-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        currentGenre = id;
        loadData(true);
    }

    function playMovie(id, type) {
        activeMovieId = id;
        activeType = type;
        const frame = document.getElementById('videoFrame');
        const path = activeType === 'tv' ? `tv/${activeMovieId}` : `movie/${activeMovieId}`;
        frame.src = `https://vidsrc.to/embed/${path}`; // استخدام السيرفر الأساسي النقي
        document.getElementById('playerZone').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('playerZone').style.display = 'none';
        document.getElementById('videoFrame').src = "";
    }

    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.n-item').forEach(item => item.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
    }

    // نظام التحميل اللانهائي للوصول لـ +500 فيلم
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (currentPage < 35) loadData(); // 35 صفحة تعني 700 فيلم
        }
    };

    loadData();
</script>
</body>
</html>
