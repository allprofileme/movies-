<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walaa Cinema | Shashaty Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #0f0; --bg: #050505; --card: #121212; --txt: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--txt); font-family: 'Cairo', sans-serif; overflow-x: hidden; padding-bottom: 70px; transition: 0.3s; }
        
        .has-outline { text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* شريط التنقل السفلي (مثل الصورة بالضبط) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 5000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--neon); }
        .nav-item.active i { filter: drop-shadow(0 0 5px var(--neon)); }

        /* الصفحات */
        .page { display: none; padding: 20px 15px; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الرئيسية */
        .sh-logo { text-align: center; padding: 10px; font-weight: 900; font-size: 24px; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        .hero-banner { width: 100%; height: 200px; border-radius: 15px; background: url('https://image.tmdb.org/t/p/original/mBaXZ95O2vS7AyvOcAs0Yq61wdW.jpg') center/cover; margin-bottom: 20px; border: 1px solid #333; position: relative; }
        .section-title { font-size: 16px; font-weight: 700; margin: 20px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-title span { color: var(--neon); font-size: 12px; }

        /* شبكة الأفلام */
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-card { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .m-card img { width: 100%; height: 150px; object-fit: cover; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: gold; font-size: 10px; padding: 2px 5px; border-radius: 5px; }

        /* البحث (مثل الصورة 1671) */
        .search-bar { background: #1a1a1a; border-radius: 10px; padding: 12px; display: flex; align-items: center; margin-bottom: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: 'Cairo'; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .f-tab { padding: 8px 20px; background: #1a1a1a; border-radius: 20px; font-size: 13px; white-space: nowrap; }
        .f-tab.active { background: var(--neon); color: #000; font-weight: bold; }

        /* الأقسام (مثل الصورة 1672/1673) */
        .genre-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .g-card { height: 100px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; overflow: hidden; border: 1px solid #333; }
        .g-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .g-card span { z-index: 2; position: relative; text-shadow: 0 0 10px #000; }

        /* الإعدادات (مثل الصورة 1675) */
        .set-group { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .set-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* المشغل */
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; flex-direction: column; }
    </style>
</head>
<body class="has-outline">

    <div id="home" class="page active">
        <div class="sh-logo">Walaa Cinema 🛡️</div>
        <div class="hero-banner"></div>
        <div class="section-title">الأفلام المميزة 🎬 <span>عرض الكل</span></div>
        <div class="movie-grid" id="featuredGrid"></div>
    </div>

    <div id="genres" class="page">
        <h2 style="text-align: center;">الأقسام</h2>
        <div class="genre-grid">
            <div class="g-card" onclick="loadGenre(28)"><span>أكشن</span><img src="https://image.tmdb.org/t/p/w500/8Y7S9S7TTuG4vBne77SnyT0pFFp.jpg"></div>
            <div class="g-card" onclick="loadGenre(27)"><span>رعب</span><img src="https://image.tmdb.org/t/p/w500/7pEnS0vByFY0Xwln69nuGfsz8vM.jpg"></div>
            <div class="g-card" onclick="loadGenre(35)"><span>كوميدي</span><img src="https://image.tmdb.org/t/p/w500/8Y7S9S7TTuG4vBne77SnyT0pFFp.jpg"></div>
            <div class="g-card" onclick="loadGenre(16)"><span>أنمي</span><img src="https://image.tmdb.org/t/p/w500/2L9S9S7TTuG4vBne77SnyT0pFFp.jpg"></div>
        </div>
    </div>

    <div id="search" class="page">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="مثلاً: Batman" oninput="searchMovies()">
        </div>
        <div class="filter-tabs">
            <div class="f-tab active">الكل</div>
            <div class="f-tab">الأفلام</div>
            <div class="f-tab">المسلسلات</div>
        </div>
        <div id="searchGrid" class="movie-grid"></div>
    </div>

    <div id="settings" class="page">
        <h2>المزيد</h2>
        <div class="set-group">
            <div class="set-row"><span>تفعيل الإشعارات</span><input type="checkbox" checked></div>
            <div class="set-row"><span>حجم الخط</span><input type="range" min="12" max="20" value="14"></div>
        </div>
        <h3>لون الخط</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="color-dot active" style="background: #0f0;" onclick="changeTheme('#0f0')"></div>
            <div class="color-dot" style="background: #f00;" onclick="changeTheme('#f00')"></div>
            <div class="color-dot" style="background: #007bff;" onclick="changeTheme('#007bff')"></div>
            <div class="color-dot" style="background: #ff00ff;" onclick="changeTheme('#ff00ff')"></div>
        </div>
        <button class="btn-save" onclick="alert('تم الحفظ بنجاح!')">حفظ</button>
        <div class="set-group" style="margin-top: 20px; cursor: pointer;" onclick="window.location.href='https://t.me/FFFdif'">
            حول المطور 🛡️
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('home', this)"><i>🏠</i>الرئيسية</div>
        <div class="nav-item" onclick="showTab('search', this)"><i>🔍</i>البحث</div>
        <div class="nav-item" onclick="showTab('genres', this)"><i>🔲</i>الأقسام</div>
        <div class="nav-item" onclick="showTab('settings', this)"><i>⚙️</i>الإعدادات</div>
    </div>

    <div id="player">
        <button onclick="closePlayer()" style="background:red; color:white; border:none; padding:10px;">إغلاق X</button>
        <iframe id="videoFrame" style="width:100%; height:90%; border:none;" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = "851ccad574593617d921dde51303751c";

        async function init() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}&language=ar`);
            const data = await res.json();
            render(data.results, 'featuredGrid');
        }

        async function searchMovies() {
            const q = document.getElementById('searchInput').value;
            if (q.length < 2) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=ar`);
            const data = await res.json();
            render(data.results, 'searchGrid');
        }

        function render(items, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";
            items.forEach(m => {
                if (m.poster_path) {
                    const div = document.createElement('div');
                    div.className = "m-card";
                    div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="rating">⭐ ${m.vote_average.toFixed(1)}</div>`;
                    div.onclick = () => play(m.id, m.media_type || 'movie');
                    grid.appendChild(div);
                }
            });
        }

        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--neon', color);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        }

        function play(id, type) {
            const path = type === 'tv' ? `tv/${id}` : `movie/${id}`;
            document.getElementById('videoFrame').src = `https://vidsrc.to/embed/${path}`;
            document.getElementById('player').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('videoFrame').src = "";
        }

        init();
    </script>
</body>
</html>
